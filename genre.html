<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ジャンル・エリア別お店一覧</title>
    <link rel="stylesheet" href="genre.css">
</head>
<body>

    <div id="header-import" style="display: none;"></div>

    <div class="container">
        <h1>🔍 条件からお店を探す</h1>
        <p class="subtitle">いまの気分に合わせて絞り込んでね！</p>

        <div class="filter-card">
            <div class="filter-group" style="margin-bottom: 15px;">
                <label for="list-genre">ジャンルを選択</label>
                <select id="list-genre" onchange="showCategoryShops()">
                    <option value="all">すべてのジャンル</option>
                    <option value="ラーメン">ラーメン</option>
                    <option value="和食">和食</option>
                    <option value="洋食">洋食・ハンバーグ等</option>
                    <option value="中華">中華</option>
                    <option value="イタリアン">イタリアン</option>
                    <option value="焼肉">焼肉</option>
                    <option value="カレー">カレー</option>
                    <option value="ハンバーガー">ハンバーガー</option>
                    <option value="パン">パン・ベーカリー</option>
                    <option value="海鮮">海鮮</option>
                    <option value="オムライス">オムライス</option>
                    <option value="ハンバーグ">ハンバーグ</option>
                    <option value="デザート">デザート</option>
                    <option value="抹茶">抹茶</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="list-area">エリアを選択</label>
                <select id="list-area" onchange="showCategoryShops()">
                    <option value="all">すべてのエリア</option>
                    <option value="淵野辺">淵野辺駅周辺</option>
                    <option value="町田">町田駅周辺</option>
                </select>
            </div>
        </div>

        <div class="count-text" id="match-count">🔍 ヒットしたお店: 0件</div>

        <div class="shop-cards-container" id="shop-cards-list"></div>

        <div class="back-link">
            <a href="home.html">← トップページに戻る</a>
        </div>
    </div>

    <script src="genre.js"></script>
</body>
</html>
