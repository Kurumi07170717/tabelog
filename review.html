<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>評価を投稿する</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="review.css">
</head>
<body>

    <div id="header-import" style="display: none;"></div>

    <div class="container">
        <div class="upload-section" id="upload-trigger">
            <input type="file" id="image-input" accept="image/*" multiple style="display: none;">
            <div class="upload-placeholder" id="placeholder">
                <i class="fa-solid fa-camera"></i>
                <p>写真をタップして追加</p>
            </div>
            <div class="preview-container" id="preview-container"></div>
        </div>

        <div class="main-content">
            <h1 id="shop-name-display">お店の名前</h1>
            
            <div class="rating-group overall">
                <p class="rating-label">総合評価</p>
                <div class="star-rating" data-id="overall">
                    <i class="fa-regular fa-star" data-value="1"></i>
                    <i class="fa-regular fa-star" data-value="2"></i>
                    <i class="fa-regular fa-star" data-value="3"></i>
                    <i class="fa-regular fa-star" data-value="4"></i>
                    <i class="fa-regular fa-star" data-value="5"></i>
                </div>
            </div>

            <hr class="divider">

            <div id="dynamic-rating-fields">
                </div>

            <div class="btn-section">
                <button id="submit-review" class="action-btn">この内容で投稿する</button>
            </div>
        </div>

        <div class="back-link">
            <a href="javascript:history.back()">← 戻る</a>
        </div>
    </div>

    <script src="review.js"></script>
</body>
</html>
